<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="ScamaNet — портфолио, блог и контакты веб-разработчика в формате удобного одностраничного сайта."
		/>
		<title>ScamaNet</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="site-shell">
			<header class="site-header">
				<a class="logo" href="#home" aria-label="ScamaNet, перейти на главную">
					ScamaNet
				</a>

				<nav class="site-nav" aria-label="Основная навигация">
					<ul class="nav-list" data-role="nav"></ul>
				</nav>
			</header>

			<main class="site-main">
				<div class="view-root" data-role="view" aria-live="polite"></div>
				<noscript class="no-script">
					Для работы сайта нужно включить JavaScript: навигация и контент теперь
					рендерятся модульно.
				</noscript>
			</main>

			<footer class="site-footer" data-role="footer"></footer>
		</div>

		<script type="module" src="script.js"></script>
	</body>
</html>
